<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="noise-overlay"></div>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
                <span>Pulse</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="active">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    Home
                </a>
                <a href="#" id="nav-search">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Search
                </a>
                <a href="#">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    Library
                </a>
            </nav>
            <div class="playlists">
                <div class="playlist-header">
                    <h3>YOUR PLAYLISTS</h3>
                    <button id="btn-upload" class="upload-btn" title="Upload Local Music" aria-label="Upload local music">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                    <input type="file" id="file-upload" accept="audio/*" multiple class="hidden" title="Upload music files" aria-label="Upload music files">
                </div>
                <ul id="playlist-list">
                    <!-- Dynamic playlists will be injected here -->
                </ul>
                <div class="playlist-header sync-header">
                    <h3>LOCAL SYNC</h3>
                </div>
                <div class="sync-container">
                    <input type="text" id="sync-path" placeholder="C:\Users\Hi\Music" class="sync-input" aria-label="Local folder path">
                    <button id="btn-sync" class="sync-btn" title="Scan Folder" aria-label="Scan Folder">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-view">
            <header class="hero">
                <img id="hero-cover" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=600" alt="Hero Album">
                <div class="hero-info">
                    <span>PLAYLIST</span>
                    <h1 id="hero-title">Neon Dreams</h1>
                    <p id="hero-desc">Synthwave Master • 3 songs, 19 min</p>
                </div>
            </header>

            <div class="track-list-container">
                <div id="search-container" class="hidden">
                    <input type="text" id="search-input" placeholder="What do you want to listen to?" aria-label="Search tracks">
                </div>
                <table class="track-list">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>TITLE</th>
                            <th>ALBUM</th>
                            <th><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg></th>
                        </tr>
                    </thead>
                    <tbody id="track-table-body">
                        <!-- Tracks injected here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="player-bar">
        <canvas id="visualizer-canvas"></canvas>
        <div class="player-content">
            <div class="now-playing">
                <img id="np-cover" src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&q=80&w=150" alt="Cover">
                <div class="np-info">
                    <div class="title-row">
                        <div id="np-title">Neon Dreams</div>
                        <div class="mini-eq" id="mini-eq">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>
                    </div>
                    <div id="np-artist">Synthwave Master</div>
                </div>
                <button id="btn-like" class="icon-btn like-btn" aria-label="Like" title="Like">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                </button>
            </div>

            <div class="player-controls">
                <div class="control-buttons">
                    <button id="btn-shuffle" class="icon-btn" aria-label="Shuffle" title="Shuffle"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg></button>
                    <button id="btn-prev" class="icon-btn" aria-label="Previous Track" title="Previous Track"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg></button>
                    <button id="btn-play" class="play-btn" aria-label="Play or Pause" title="Play or Pause"><svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                    <button id="btn-next" class="icon-btn" aria-label="Next Track" title="Next Track"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg></button>
                    <button id="btn-repeat" class="icon-btn" aria-label="Repeat" title="Repeat"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg></button>
                </div>
                <div class="progress-container">
                    <span id="time-current">0:00</span>
                    <input type="range" id="seek-slider" min="0" max="100" value="0" aria-label="Seek slider" title="Seek slider">
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="volume-controls">
                <button id="btn-queue" class="icon-btn" aria-label="Queue" title="Queue"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg></button>
                <button id="btn-mute" class="icon-btn" aria-label="Mute" title="Mute"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg></button>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" aria-label="Volume slider" title="Volume slider">
            </div>
        </div>
    </div>
    

    <div class="queue-panel" id="queue-panel">
        <div class="queue-header">
            <h3>Up Next</h3>
            <button id="btn-close-queue" class="icon-btn" aria-label="Close Queue" title="Close Queue"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <ul id="queue-list" class="queue-list"></ul>
    </div>

    <audio id="audio-element" crossorigin="anonymous"></audio>

    <script src="visualizer.js"></script>
    <script src="app.js"></script>
</body>
</html>
